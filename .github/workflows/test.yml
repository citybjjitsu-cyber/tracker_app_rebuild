name: Test & Coverage

on:
  push:
  pull_request:

jobs:
  lint-backend:
    name: Lint & SAST (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check . --no-cache
      - name: Ruff SAST (security rules)
        run: uv run ruff check --select S .
      - name: Check Alembic migration heads
        run: |
          uv run alembic check 2>&1 || echo "::warning::Alembic detected ungenerated migrations"

  lint-frontend:
    name: Lint & Audit (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ckb-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ckb-tracker/package-lock.json
      - name: Check Node/npm versions
        run: node --version && npm --version
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: npm audit (high severity+)
        run: npm audit --audit-level=high
        continue-on-error: true

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Check Python version
        run: python --version && uv --version
      - name: Run migrations
        env:
          DATABASE_URL: "sqlite:///./test_migrations.db"
        run: uv run alembic upgrade head
      - name: Run tests
        env:
          ALLOWED_HOSTS: '*'
        run: |
          uv run pytest tests/ -v --tb=long --junitxml=test-results.xml 2>&1 | tee pytest-output.txt
          exit ${PIPESTATUS[0]}
      - name: Write failure output to job summary
        if: failure()
        run: |
          {
            echo "## Test Failures (last 80 lines)"
            echo '```'
            tail -80 pytest-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage_html/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ckb-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ckb-tracker/package-lock.json
      - name: Check Node/npm versions
        run: node --version && npm --version
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run tests with coverage
        run: npm run test -- --coverage 2>&1
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ckb-tracker/coverage/

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ckb-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install backend dependencies
        run: uv sync
        working-directory: backend
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ckb-tracker/package-lock.json
      - name: Install frontend dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: ''
      - name: Run database migrations
        working-directory: backend
        env:
          ALLOWED_HOSTS: '*'
        run: uv run alembic upgrade head
      - name: Bootstrap E2E test users
        working-directory: backend
        env:
          ALLOWED_HOSTS: '*'
        run: |
          uv run ckb bootstrap \
            --email "${{ secrets.E2E_KIOSK_EMAIL || 'kiosk@ckbtracker.com' }}" \
            --password "${{ secrets.E2E_KIOSK_PASSWORD || 'kiosk123' }}" \
            --first-name Kiosk --last-name Service || true
      - name: Run Playwright e2e tests
        env:
          ALLOWED_HOSTS: '*'
          E2E_KIOSK_EMAIL: ${{ secrets.E2E_KIOSK_EMAIL }}
          E2E_KIOSK_PASSWORD: ${{ secrets.E2E_KIOSK_PASSWORD }}
          E2E_STUDENT_PIN: ${{ secrets.E2E_STUDENT_PIN }}
        run: npx playwright test 2>&1
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ckb-tracker/playwright-report/
