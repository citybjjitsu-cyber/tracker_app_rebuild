name: Test & Coverage

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Check Python version
        run: python --version && uv --version
      - name: Run tests grouped by file, stopping on first failure
        run: |
          failed=""
          for test_file in tests/test_*.py; do
            echo "::group::$test_file"
            echo "Running: $test_file"
            uv run pytest "$test_file" -v --tb=long --junitxml="junit-${test_file##*/}.xml" 2>&1
            rc=$?
            if [ $rc -eq 0 ]; then
              echo "PASSED: $test_file"
            else
              echo "FAILED: $test_file (exit code: $rc)"
              echo "::error title=Test Failure::$test_file failed on Linux/Python 3.12 (exit code: $rc)"
              failed="$test_file"
              echo "::endgroup::"
              exit $rc
            fi
            echo "::endgroup::"
          done
          echo "All tests passed!"
      - name: Run all tests with coverage (if all passed)
        if: success()
        run: |
          uv run pytest tests/ --cov=app --cov-report=term --cov-report=html 2>&1
      - name: Debug - show JUnit XML on failure
        if: failure()
        run: |
          echo '## Test Failure Details' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          for xml in junit-*.xml; do
            if [ -f "$xml" ]; then
              echo "### $xml" >> $GITHUB_STEP_SUMMARY
              echo '```xml' >> $GITHUB_STEP_SUMMARY
              cat "$xml" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          done
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage_html/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ckb-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ckb-tracker/package-lock.json
      - name: Check Node/npm versions
        run: node --version && npm --version
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run tests with coverage
        run: npm run test -- --coverage 2>&1
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ckb-tracker/coverage/
