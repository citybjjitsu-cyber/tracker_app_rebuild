name: Test & Coverage

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Check Python version
        run: python --version && uv --version
      - name: Run tests first (without coverage) to isolate failure
        run: uv run pytest tests/ -v --tb=long --junitxml=test-results.xml 2>&1
      - name: Then run with coverage
        if: success()
        run: uv run pytest tests/ --cov=app --cov-report=term --cov-report=html --junitxml=test-results-cov.xml 2>&1
      - name: Debug - show test-results.xml
        if: always()
        run: |
          echo "===== test-results.xml ====="
          cat test-results.xml 2>&1 || echo "(no test-results.xml)"
          echo ""
          echo "===== coverage test-results (if exists) ====="
          cat test-results-cov.xml 2>&1 || echo "(no test-results-cov.xml)"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage_html/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ckb-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ckb-tracker/package-lock.json
      - name: Check Node/npm versions
        run: node --version && npm --version
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run tests with coverage
        run: npm run test -- --coverage 2>&1
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ckb-tracker/coverage/
