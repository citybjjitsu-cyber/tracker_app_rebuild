name: Test & Coverage

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Check Python version
        run: python --version && uv --version
      - name: Run tests
        run: |
          uv run pytest tests/ -v --tb=long --junitxml=test-results.xml 2>&1 | tee pytest-output.txt
          exit ${PIPESTATUS[0]}
      - name: Show failures as annotations
        if: failure()
        run: |
          echo "::notice title=Test Results::View full output at: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"
          python -c "
import xml.etree.ElementTree as ET
import sys
tree = ET.parse('test-results.xml')
root = tree.getroot()
count = 0
for suite in root.findall('.//testcase'):
    failure = suite.find('failure')
    if failure is not None:
        count += 1
        name = suite.get('classname', '') + '.' + suite.get('name', '')
        msg = (failure.get('message', '') or '')[:200]
        print(f'::error title={name}::{msg}')
if count == 0:
    print('::warning::No tests failed in JUnit. Exit code 1 may be from coverage threshold or a crash.')
"
      - name: Publish failure details to gist
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "### pytest-output.txt (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 pytest-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          GIST_URL=$(gh gist create --public --filename "pytest-output-${{ github.run_id }}.txt" \
            --desc "CI Failure: pytest output for ${{ github.repository }} run ${{ github.run_id }}" \
            pytest-output.txt 2>&1) && \
          gh api repos/${{ github.repository }}/commits/${{ github.sha }}/statuses \
            --field state='failure' \
            --field target_url="$GIST_URL" \
            --field description='Test failures - click for details' \
            --field context='pytest-output' && \
          echo "::notice title=Pytest output gist::$GIST_URL"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage_html/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ckb-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ckb-tracker/package-lock.json
      - name: Check Node/npm versions
        run: node --version && npm --version
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run tests with coverage
        run: npm run test -- --coverage 2>&1
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ckb-tracker/coverage/
