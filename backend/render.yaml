# CKB Tracker Backend — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: ckb-tracker-db-dev
    databaseName: ckb_tracker
    user: ckb_tracker
    plan: free
    postgresMajorVersion: 16
    ipAllowList: []

services:
  - type: web
    name: ckb-tracker-api-dev
    env: python
    buildCommand: cd backend && pip install uv && uv sync
    startCommand: cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ckb-tracker-db-dev
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: COOKIE_SECURE
        value: "True"
      - key: COOKIE_SAMESITE
        value: "Strict"
      - key: ENVIRONMENT
        value: "production"
      - key: HSTS_ENABLED
        value: "True"
      - key: ALLOWED_HOSTS
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: MAX_SESSION_HOURS
        value: "24"
      - key: PYTHON_VERSION
        value: "3.12"
      # SMTP — set these manually in Render dashboard (sync: false)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: INVITE_FROM_EMAIL
        sync: false
