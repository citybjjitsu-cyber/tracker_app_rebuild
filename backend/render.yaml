# CKB Tracker Backend — Render Blueprint
# Docs: https://render.com/docs/blueprint-spec
# Use: Import this file via Render Dashboard → Blueprint
# Or: Configure manually as a Web Service using these values

services:
  - type: web
    name: ckb-tracker-api-dev
    env: python
    buildCommand: cd backend && pip install uv && uv sync
    startCommand: cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: COOKIE_SECURE
        value: "True"
      - key: COOKIE_SAMESITE
        value: "Strict"
      - key: ENVIRONMENT
        value: "staging"
      - key: HSTS_ENABLED
        value: "True"
      - key: ALLOWED_HOSTS
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: MAX_SESSION_HOURS
        value: "24"
      - key: PYTHON_VERSION
        value: "3.12"
